services:
  - type: web
    name: talkbold-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: MONGO_URI
        sync: false          # Set in Render dashboard → MongoDB Atlas URI
      - key: GEMINI_API_KEY
        sync: false          # Set in Render dashboard → your Gemini API key
      - key: SECRET_KEY
        sync: false          # Set in Render dashboard → any long random string
      - key: FIREBASE_ADMIN_JSON
        sync: false          # Set in Render dashboard → paste contents of firebase-admin.json
